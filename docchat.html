<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DocChat — Smart Document Q&A</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
<style>
  :root {
    --surface-0: #f1efea; --surface-1: #f7f6f3; --surface-2: #ffffff;
    --text-primary: #1a1a18; --text-secondary: #4a4a46; --text-muted: #888780;
    --text-accent: #185fa5; --text-success: #3b6d11; --text-danger: #a32d2d; --text-warning: #854f0b;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18); --border-accent: #378add;
    --bg-accent: #e6f1fb; --bg-success: #eaf3de; --bg-danger: #fcebeb; --bg-warning: #faeeda;
    --fill-accent: #378add; --on-accent: #ffffff;
    --radius: 8px; --font-sans: system-ui, -apple-system, sans-serif; --font-mono: 'Menlo', monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-0: #1c1c1a; --surface-1: #242422; --surface-2: #2e2e2b;
      --text-primary: #f0ede8; --text-secondary: #b0ada6; --text-muted: #6a6860;
      --text-accent: #85b7eb; --text-success: #97c459; --text-danger: #f09595; --text-warning: #ef9f27;
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14); --border-accent: #378add;
      --bg-accent: #042c53; --bg-success: #173404; --bg-danger: #501313; --bg-warning: #412402;
      --fill-accent: #378add; --on-accent: #ffffff;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--surface-0); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; }
  .app { display: flex; flex-direction: column; height: 100vh; }
  .topbar { display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-bottom: 0.5px solid var(--border); background: var(--surface-2); }
  .topbar-title { font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .badge-green { background: var(--bg-success); color: var(--text-success); }
  .badge-blue { background: var(--bg-accent); color: var(--text-accent); }
  .api-row { display: flex; align-items: center; gap: 8px; padding: 8px 18px; border-bottom: 0.5px solid var(--border); background: var(--surface-1); }
  .api-row input { flex: 1; font-size: 12px; padding: 6px 10px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-primary); font-family: var(--font-mono); }
  .api-row input:focus { outline: none; border-color: var(--border-accent); }
  .api-row label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 260px; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; background: var(--surface-1); overflow-y: auto; flex-shrink: 0; }
  .sidebar-section { padding: 10px 12px; border-bottom: 0.5px solid var(--border); }
  .sidebar-label { font-size: 10px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
  .upload-zone { border: 0.5px dashed var(--border-strong); border-radius: var(--radius); padding: 16px 10px; text-align: center; cursor: pointer; transition: background 0.15s; }
  .upload-zone:hover, .upload-zone.drag { background: var(--bg-accent); border-color: var(--border-accent); }
  .upload-zone p { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .upload-zone i { font-size: 22px; color: var(--text-secondary); }
  .progress-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; display: none; }
  .progress-fill { height: 100%; background: var(--fill-accent); border-radius: 2px; transition: width 0.25s; width: 0%; }
  .progress-label { font-size: 10px; color: var(--text-muted); margin-top: 3px; display: none; }
  .doc-list { display: flex; flex-direction: column; gap: 5px; }
  .doc-item { display: flex; align-items: center; gap: 7px; padding: 7px 9px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface-2); cursor: pointer; transition: all 0.12s; }
  .doc-item:hover { border-color: var(--border-accent); }
  .doc-item.active { border-color: var(--border-accent); background: var(--bg-accent); }
  .doc-item-name { flex: 1; font-size: 12px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-item.active .doc-item-name { color: var(--text-accent); }
  .doc-item-meta { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
  .doc-remove { font-size: 13px; color: var(--text-muted); cursor: pointer; padding: 2px; }
  .doc-remove:hover { color: var(--text-danger); }
  .active-doc-info { font-size: 12px; color: var(--text-secondary); line-height: 1.5; background: var(--surface-2); border-radius: var(--radius); padding: 8px; border: 0.5px solid var(--border); max-height: 100px; overflow-y: auto; }
  .action-btn { width: 100%; padding: 7px 10px; font-size: 12px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-primary); cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 5px; transition: background 0.12s; text-align: left; }
  .action-btn:hover { background: var(--surface-1); }
  .action-btn i { font-size: 13px; color: var(--text-secondary); }
  .export-btn { width: 100%; padding: 7px 10px; font-size: 12px; border-radius: var(--radius); border: 0.5px solid var(--border-accent); background: var(--bg-accent); color: var(--text-accent); cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-weight: 500; }
  .export-btn:hover { opacity: 0.85; }
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .doc-tabs { display: flex; border-bottom: 0.5px solid var(--border); background: var(--surface-1); overflow-x: auto; padding: 0 12px; display: none; }
  .doc-tab, .doc-tab-all { padding: 8px 12px; font-size: 12px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: color 0.12s; background: none; border-top: none; border-left: none; border-right: none; font-family: var(--font-sans); }
  .doc-tab:hover, .doc-tab-all:hover { color: var(--text-primary); }
  .doc-tab.active, .doc-tab-all.active { color: var(--text-accent); border-bottom-color: var(--fill-accent); font-weight: 500; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 14px; border-bottom: 0.5px solid var(--border); }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-secondary); cursor: pointer; transition: background 0.12s; }
  .chip:hover { background: var(--bg-accent); color: var(--text-accent); border-color: var(--border-accent); }
  .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
  .avatar.ai { background: var(--bg-accent); color: var(--text-accent); }
  .avatar.user { background: var(--bg-success); color: var(--text-success); }
  .bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; }
  .bubble.ai { background: var(--surface-1); border: 0.5px solid var(--border); color: var(--text-primary); border-radius: 2px 12px 12px 12px; }
  .bubble.user { background: var(--bg-accent); color: var(--text-accent); border-radius: 12px 2px 12px 12px; }
  .bubble.loading { color: var(--text-muted); font-style: italic; }
  .input-row { padding: 12px 16px; border-top: 0.5px solid var(--border); display: flex; gap: 8px; background: var(--surface-2); }
  .input-row textarea { flex: 1; resize: none; font-size: 14px; padding: 8px 12px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-primary); font-family: var(--font-sans); line-height: 1.5; height: 38px; }
  .input-row textarea:focus { outline: none; border-color: var(--border-accent); }
  .send-btn { padding: 8px 14px; border-radius: var(--radius); border: none; background: var(--fill-accent); color: var(--on-accent); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 500; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-muted); font-size: 14px; }
  .empty-state i { font-size: 36px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <i class="ti ti-files" style="font-size:18px;color:var(--text-accent)"></i>
    <span class="topbar-title">DocChat</span>
    <span class="badge badge-green">Gemini Free</span>
    <span class="badge badge-blue" id="docCountBadge" style="display:none">0 docs</span>
    <span style="flex:1"></span>
    <span id="pdfStatus" style="font-size:11px;color:var(--text-muted)">Loading PDF engine...</span>
  </div>
  <div class="api-row">
    <label for="apikey"><i class="ti ti-key" style="font-size:12px"></i> Gemini key</label>
    <input type="password" id="apikey" placeholder="AIza..." />
    <a href="https://aistudio.google.com/app/apikey" style="font-size:11px;color:var(--text-accent);white-space:nowrap;" target="_blank">Get free key ↗</a>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Add document</div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="handleDrop(event)">
          <i class="ti ti-upload"></i>
          <p>Click or drag PDF / TXT</p>
          <p style="font-size:10px;margin-top:2px;">Add multiple documents</p>
        </div>
        <input type="file" id="fileInput" accept=".pdf,.txt" style="display:none" onchange="handleFile(this.files[0])" />
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel"></div>
        <textarea id="pasteArea" placeholder="Or paste text here..." style="width:100%;margin-top:8px;height:65px;resize:none;font-size:12px;padding:8px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-primary);font-family:var(--font-sans);" oninput="onPasteInput()"></textarea>
      </div>
      <div class="sidebar-section" id="docListSection" style="display:none">
        <div class="sidebar-label" style="display:flex;align-items:center;justify-content:space-between;">
          <span>Documents</span><span id="docCount" style="font-size:10px;color:var(--text-muted)"></span>
        </div>
        <div class="doc-list" id="docList"></div>
      </div>
      <div class="sidebar-section" id="activeDocSection" style="display:none">
        <div class="sidebar-label">Preview</div>
        <div class="active-doc-info" id="activeDocPreview"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Quick actions</div>
        <button class="action-btn" onclick="quickAction('Give me a concise summary in 3-4 sentences.')"><i class="ti ti-list"></i>Summarize</button>
        <button class="action-btn" onclick="quickAction('Extract all key facts, dates, names, and numbers.')"><i class="ti ti-database"></i>Extract key facts</button>
        <button class="action-btn" onclick="quickAction('List all action items or decisions mentioned.')"><i class="ti ti-checkbox"></i>Find action items</button>
        <button class="action-btn" onclick="quickAction('Compare the main points across all documents.')"><i class="ti ti-git-compare"></i>Compare docs</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Export</div>
        <button class="export-btn" onclick="exportChat()"><i class="ti ti-download"></i>Export chat as PDF</button>
        <button class="action-btn" onclick="copyChat()"><i class="ti ti-copy"></i>Copy chat as text</button>
      </div>
    </div>
    <div class="chat-area">
      <div class="doc-tabs" id="docTabs">
        <button class="doc-tab-all active" id="tabAll" onclick="setActiveDoc('all')"><i class="ti ti-files" style="font-size:12px"></i>All docs</button>
      </div>
      <div class="chip-row">
        <span style="font-size:10px;color:var(--text-muted);align-self:center;margin-right:2px;">Try:</span>
        <span class="chip" onclick="useChip(this)">What is this about?</span>
        <span class="chip" onclick="useChip(this)">Key conclusions?</span>
        <span class="chip" onclick="useChip(this)">Explain simply</span>
        <span class="chip" onclick="useChip(this)">Any risks?</span>
        <span class="chip" onclick="useChip(this)">Compare documents</span>
      </div>
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <i class="ti ti-file-upload"></i>
          <span>Upload documents to start chatting</span>
        </div>
      </div>
      <div class="input-row">
        <textarea id="userInput" placeholder="Ask anything about your documents..." onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled><i class="ti ti-send"></i></button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
let docs = [], activeDocId = 'all', chatHistory = [], pdfJsReady = false, pasteDebounce = null;
window.addEventListener('load', () => {
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    pdfJsReady = true;
    document.getElementById('pdfStatus').textContent = 'PDF engine ready';
    setTimeout(() => document.getElementById('pdfStatus').textContent = 'Smart Document Q&A', 2000);
  } else { document.getElementById('pdfStatus').textContent = 'PDF unavailable'; }
});
function setProgress(pct, label) {
  const bar = document.getElementById('progressBar'), fill = document.getElementById('progressFill'), lbl = document.getElementById('progressLabel');
  if (pct === null) { bar.style.display = 'none'; lbl.style.display = 'none'; return; }
  bar.style.display = 'block'; lbl.style.display = 'block'; fill.style.width = pct + '%'; lbl.textContent = label;
}
function handleDrop(e) { e.preventDefault(); document.getElementById('uploadZone').classList.remove('drag'); Array.from(e.dataTransfer.files).forEach(f => handleFile(f)); }
async function handleFile(file) {
  if (!file) return;
  if (file.type === 'text/plain') { const text = await file.text(); addDoc(text, file.name, 'txt', null); }
  else if (file.type === 'application/pdf') await extractPDF(file);
}
async function extractPDF(file) {
  if (!pdfJsReady) { addMessage('ai', 'PDF engine still loading, try again shortly.'); return; }
  setProgress(5, 'Reading PDF...');
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const n = pdf.numPages; let fullText = '';
    for (let i = 1; i <= n; i++) {
      setProgress(Math.round((i / n) * 90) + 5, 'Page ' + i + ' of ' + n + '...');
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      fullText += '\n[Page ' + i + ']\n' + content.items.map(it => it.str).join(' ') + '\n';
    }
    setProgress(100, 'Done!'); setTimeout(() => setProgress(null), 700);
    addDoc(fullText.trim(), file.name, 'pdf', n);
  } catch (err) { setProgress(null); addMessage('ai', 'Could not extract PDF: ' + err.message); }
}
function onPasteInput() {
  clearTimeout(pasteDebounce);
  pasteDebounce = setTimeout(() => {
    const val = document.getElementById('pasteArea').value.trim();
    if (val.length > 30) { addDoc(val, 'Pasted text ' + (docs.length + 1), 'txt', null); document.getElementById('pasteArea').value = ''; }
  }, 900);
}
function addDoc(text, name, type, pages) {
  const id = Date.now() + Math.random(), words = text.split(/\s+/).length;
  docs.push({ id, text, name, type, pages, words });
  renderDocList(); setActiveDoc(id);
  addMessage('ai', '"' + name + '" added (' + words.toLocaleString() + ' words' + (pages ? ', ' + pages + ' pages' : '') + '). ' + (docs.length > 1 ? 'I now have ' + docs.length + ' documents loaded.' : 'Ask me anything about it!'));
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('emptyState').style.display = 'none';
}
function removeDoc(id, e) {
  e.stopPropagation(); docs = docs.filter(d => d.id !== id);
  if (activeDocId === id) activeDocId = 'all';
  renderDocList(); setActiveDoc(activeDocId);
  if (!docs.length) { document.getElementById('sendBtn').disabled = true; document.getElementById('docListSection').style.display = 'none'; document.getElementById('activeDocSection').style.display = 'none'; document.getElementById('docTabs').style.display = 'none'; document.getElementById('docCountBadge').style.display = 'none'; }
}
function renderDocList() {
  const list = document.getElementById('docList'), tabs = document.getElementById('docTabs');
  list.innerHTML = ''; while (tabs.children.length > 1) tabs.removeChild(tabs.lastChild);
  docs.forEach(doc => {
    const icon = doc.type === 'pdf' ? 'ti-file-type-pdf' : 'ti-file-text';
    const item = document.createElement('div'); item.className = 'doc-item' + (activeDocId === doc.id ? ' active' : ''); item.onclick = () => setActiveDoc(doc.id);
    item.innerHTML = '<i class="ti ' + icon + '" style="font-size:14px;color:var(--text-secondary);flex-shrink:0"></i><span class="doc-item-name">' + doc.name + '</span><span class="doc-item-meta">' + doc.words.toLocaleString() + 'w</span><i class="ti ti-x doc-remove" onclick="removeDoc(' + doc.id + ', event)" title="Remove"></i>';
    list.appendChild(item);
    const tab = document.createElement('button'); tab.className = 'doc-tab' + (activeDocId === doc.id ? ' active' : ''); tab.onclick = () => setActiveDoc(doc.id);
    tab.innerHTML = '<i class="ti ' + icon + '" style="font-size:11px"></i>' + (doc.name.length > 14 ? doc.name.slice(0, 14) + '…' : doc.name);
    tabs.appendChild(tab);
  });
  document.getElementById('docListSection').style.display = docs.length ? 'block' : 'none';
  document.getElementById('docTabs').style.display = docs.length ? 'flex' : 'none';
  document.getElementById('docCount').textContent = docs.length + ' file' + (docs.length !== 1 ? 's' : '');
  document.getElementById('docCountBadge').textContent = docs.length + ' doc' + (docs.length !== 1 ? 's' : '');
  document.getElementById('docCountBadge').style.display = docs.length ? 'inline-block' : 'none';
}
function setActiveDoc(id) {
  activeDocId = id;
  document.getElementById('tabAll').className = 'doc-tab-all' + (id === 'all' ? ' active' : '');
  document.querySelectorAll('.doc-tab').forEach((t, i) => { t.className = 'doc-tab' + (docs[i] && docs[i].id === id ? ' active' : ''); });
  document.querySelectorAll('.doc-item').forEach((el, i) => { el.className = 'doc-item' + (docs[i] && docs[i].id === id ? ' active' : ''); });
  const doc = docs.find(d => d.id === id);
  if (doc) { document.getElementById('activeDocSection').style.display = 'block'; document.getElementById('activeDocPreview').textContent = doc.text.slice(0, 300) + (doc.text.length > 300 ? '…' : ''); }
  else { document.getElementById('activeDocSection').style.display = docs.length ? 'block' : 'none'; if (docs.length) document.getElementById('activeDocPreview').textContent = docs.length + ' documents loaded. Asking across all of them.'; }
}
function buildContext() {
  if (activeDocId === 'all') return docs.length ? docs.map(d => '=== ' + d.name + ' ===\n' + d.text.slice(0, Math.floor(14000 / docs.length))).join('\n\n') : '';
  const doc = docs.find(d => d.id === activeDocId);
  return doc ? '=== ' + doc.name + ' ===\n' + doc.text.slice(0, 14000) : '';
}
function addMessage(role, text) {
  document.getElementById('emptyState').style.display = 'none';
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg ' + role;
  const avatar = document.createElement('div'); avatar.className = 'avatar ' + role; avatar.textContent = role === 'ai' ? 'AI' : 'You';
  const bubble = document.createElement('div'); bubble.className = 'bubble ' + role; bubble.textContent = text;
  div.appendChild(avatar); div.appendChild(bubble); msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function useChip(el) { document.getElementById('userInput').value = el.textContent; document.getElementById('userInput').focus(); }
async function quickAction(prompt) { if (!docs.length) { alert('Upload at least one document first.'); return; } document.getElementById('userInput').value = prompt; await sendMessage(); }
async function sendMessage() {
  const input = document.getElementById('userInput'), apiKey = document.getElementById('apikey').value.trim(), text = input.value.trim();
  if (!text || !docs.length) return;
  if (!apiKey) { alert('Enter your free Gemini API key above.'); return; }
  input.value = ''; document.getElementById('sendBtn').disabled = true;
  addMessage('user', text); chatHistory.push({ role: 'user', content: text });
  const loadBubble = addMessage('ai', 'Thinking…'); loadBubble.classList.add('loading');
  const context = buildContext();
  const scope = activeDocId === 'all' ? 'all ' + docs.length + ' document(s)' : (docs.find(d => d.id === activeDocId)?.name || 'the document');
  const systemPrompt = 'You are a helpful document analysis assistant. The user is asking about ' + scope + '.\n\nDocuments:\n' + context + '\n\nAnswer accurately and concisely. If something is not in the documents, say so. User question: ' + text;
  try {
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: systemPrompt }] }] }) });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';
    loadBubble.textContent = reply; loadBubble.classList.remove('loading'); chatHistory.push({ role: 'ai', content: reply });
  } catch (err) { loadBubble.textContent = 'Error: ' + err.message; loadBubble.classList.remove('loading'); loadBubble.style.color = 'var(--text-danger)'; }
  document.getElementById('sendBtn').disabled = false;
}
function exportChat() {
  if (!chatHistory.length) { alert('No chat to export yet.'); return; }
  const now = new Date().toLocaleString(), docNames = docs.map(d => d.name).join(', ') || 'None';
  let html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>DocChat Export</title><style>body{font-family:Georgia,serif;max-width:760px;margin:40px auto;padding:0 24px;color:#1a1a1a;line-height:1.7}h1{font-size:22px;font-weight:600;margin-bottom:4px}.meta{font-size:13px;color:#666;margin-bottom:28px;padding-bottom:14px;border-bottom:1px solid #e0e0e0}.msg{margin-bottom:18px}.label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}.label.ai{color:#1a6fbb}.label.user{color:#2a8a4a}.bubble{padding:12px 16px;border-radius:10px;font-size:14px;white-space:pre-wrap}.bubble.ai{background:#f0f6ff;border:1px solid #d0e4f7}.bubble.user{background:#f0faf4;border:1px solid #c0e8cc}.footer{font-size:12px;color:#aaa;margin-top:32px;padding-top:14px;border-top:1px solid #e0e0e0}</style></head><body><h1>DocChat Export</h1><div class="meta">Exported: ' + now + ' &nbsp;·&nbsp; Documents: ' + docNames + '</div>';
  chatHistory.forEach(m => { html += '<div class="msg"><div class="label ' + m.role + '">' + (m.role === 'ai' ? 'AI Assistant' : 'You') + '</div><div class="bubble ' + m.role + '">' + m.content.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div></div>'; });
  html += '<div class="footer">Generated by DocChat &nbsp;·&nbsp; Powered by Google Gemini (free tier)</div></body></html>';
  const blob = new Blob([html], { type: 'text/html' }), url = URL.createObjectURL(blob), a = document.createElement('a');
  a.href = url; a.download = 'docchat-export.html'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  addMessage('ai', 'Chat exported! Open the downloaded file in any browser and use File → Print → Save as PDF.');
}
